Name: Build And Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Check Firebase Config
        run: |
          echo "Checking firebase config..."
          ls -la src/firebase
          cat src/firebase/config.ts

      - name: Check App Imports
        run: |
          echo "Checking imports..."
          grep -R "@/firebase/config" src || true

      - name: Debug File Paths
        run: |
          echo "Listing MLM files to find correct path:"
          find src/lib/mlm -name "processCashback.ts"
          find src/lib/mlm -name "checkRankUpgrade.ts"

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build App
        run: npm run build
