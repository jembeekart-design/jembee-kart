<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Order Confirmation</title>
</head>
<body style="font-family:sans-serif; background:#0f172a; color:white; padding:20px;">
  <div style="backdrop-filter: blur(10px); background:rgba(255,255,255,0.1); padding:20px; border-radius:16px;">
    
    <h2>🛍️ JembeeKart</h2>
    
    <p>Hi {{name}},</p>
    
    <p>Your order <b>#{{orderId}}</b> has been successfully placed.</p>
    
    <p>Total Amount: ₹{{amount}}</p>

    <p>Status: {{status}}</p>

    <br/>

    <a href="{{trackLink}}" 
       style="padding:10px 20px; background:#6366f1; color:white; border-radius:8px; text-decoration:none;">
       Track Order
    </a>

    <br/><br/>

    <p style="opacity:0.7;">Thank you for shopping with us 💙</p>
  </div>
</body>
</html>
