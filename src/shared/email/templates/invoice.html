<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Invoice</title>
</head>
<body style="font-family:sans-serif; background:#020617; color:white; padding:20px;">
  
  <div style="backdrop-filter: blur(12px); background:rgba(255,255,255,0.08); padding:25px; border-radius:16px;">
    
    <h2>📄 Invoice</h2>

    <p><b>Order ID:</b> {{orderId}}</p>
    <p><b>Date:</b> {{date}}</p>

    <hr style="border:1px solid rgba(255,255,255,0.2)" />

    <p><b>Items:</b></p>
    <div>
      {{items}}
    </div>

    <hr style="border:1px solid rgba(255,255,255,0.2)" />

    <h3>Total: ₹{{amount}}</h3>

    <p style="opacity:0.7;">JembeeKart Pvt Ltd</p>
  </div>

</body>
</html>
